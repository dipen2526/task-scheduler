version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    command: sh -c "npm run start:prod & npm run start:worker"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: scheduler
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: scheduler-secret
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin123
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    restart: always

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    restart: always
